<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Auxiliado BKO</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <!-- BOOTSTRAP CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <!-- CSS STYLE -->
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">
    </head>
    <body>
        <h1 class="text-center mb-5">Auxiliador BKO</h1>
        <div class="container">
            <nav>
                <div class="row">
                    <div class="col-6">
                        <h3>teste</h3>
                    </div>
                    <div class="col-6">
                        <h3>teste2</h3>
                    </div>
                </div>
            </nav>
            <div class="row">
                <div class="col-6">
                    <form>
                        <div class="row">
                            <div class="col-12">
                                <label for="estadoSelect" class="form-label">Selecione o Estado</label>
                                <select class="form-select" aria-label="Selecione o Estado" id="estadoSelect">
                                    <option selected>Selecione o Estado</option>
                                    <option value="MA">MA</option>
                                    <option value="PA">PA</option>
                                    <option value="PI">PI</option>
                                    <option value="AL">AL</option>
                                    <option value="AP">AP</option>
                                    <option value="RS">RS</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label for="clienteInput" class="form-label">Nome do Cliente</label>
                                <input type="text" class="form-control" id="clienteInput" placeholder="Digite o nome do cliente">
                            </div>
                            <div class="col-12">
                                <label for="protocoloInput" class="form-label">Protocolo de Atendimento</label>
                                <input type="text" class="form-control" id="protocoloInput" placeholder="Digite o protocolo de atendimento">
                            </div>
                            <div class="col-12">
                                <label for="servicoSelect" class="form-label">Tipo de Serviço</label>
                                <select class="form-select" aria-label="Tipo de Serviço" id="servicoSelect">
                                    <option selected>Selecione o Tipo de Serviço</option>
                                    <option value="1">Desligamento</option>
                                    <option value="2">Atualização de Dados do Titular</option>
                                    <option value="3">Reclamação</option>
                                    <option value="4">Denúncia de Fraude</option>
                                    <option value="5">Troca do Medidor de Local</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Resultado do Atendimento</label><br>

                                <input type="radio" class="btn-check" name="options-base" id="deferidoCheck" autocomplete="off" checked>
                                <label class="btn" for="deferidoCheck">Deferido</label>

                                <input type="radio" class="btn-check" name="options-base" id="indeferidoCheck" autocomplete="off">
                                <label class="btn" for="indeferidoCheck">Indeferido</label>
                            </div>
                            <div class="col-12">
                                <label for="indeferimentoSelect" class="form-label">Motivo do Indeferimento</label>
                                <select class="form-select" aria-label="Motivo do Indeferimento" id="indeferimentoSelect">
                                    <option selected>Selecione o Motivo</option>
                                    <option value="1">SERVIÇO NÃO SOLICITADO PELO TITULAR</option>
                                    <option value="2">DOCUMENTAÇÃO INCOMPLETA</option>
                                    <option value="3">SEM APONTAMENTO DE ERRO</option>
                                    <option value="4">UNIDADE EM PERÍODO DE FATURAMENTO</option>
                                    <option value="5">CONTA CONTRATO NÃO LOCALIZADA/INVALIDA</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label for="indeferimentoExtra" class="form-label">Adicione mais detalhes(opcional)</label>
                                <textarea class="form-control" id="indeferimentoExtra" rows="3"></textarea>
                            </div>
                            <div class="col-12 mt-4">
                                <button type='submit' class='btn btn-primary form-control'>Gerar Script</button>
                            </div>
                            <div class="col-12 mt-3">
                                <label for="scriptTextArea" class="form-label">Script Gerado</label>
                                <textarea class="form-control" id="scriptTextArea" rows="3" disabled></textarea>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- JS BOOTSTRAP -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    </body>
</html>
